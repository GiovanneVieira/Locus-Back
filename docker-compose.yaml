services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-spring-app:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - redis
    restart: no
    develop:
      watch:
        - path: ./pom.xml
          action: rebuild

        - path: ./src
          action: rebuild

        - path: ./src/main/resources
          action: sync
          target: /app/resources

  redis:
    image: redis:7-alpine
    container_name: locus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: